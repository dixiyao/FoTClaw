# FoTClaw editable settings
# Edit this file directly.

# Default model for new FoTClaw agents when `--model` is omitted.
default_model: "google/gemini-3.1-pro-preview"

# Model used for FoT reflection/aggregation. Keep this aligned with your OpenClaw setup.
aggregation_model: "google/gemini-3.1-pro-preview"

# Path to the OpenClaw CLI binary.
openclaw_path: openclaw

# Python class path for the FoT local pipeline, for example package.module:CustomLocalReasoner.
local_reasoning_class: "fot.fot_client:OpenClawFoTClient"

# Python class path for the FoT global aggregation pipeline, for example package.module:CustomGlobalReasoner.
global_reasoning_class: "fot.fot_server:OpenClawFoTServer"

# Turn automatic aggregation on or off.
auto_aggregate_enabled: true

# Auto aggregate once at least this many reasoning traces exist.
auto_aggregate_trace_threshold: 25

# Minimum delay between automatic aggregation runs.
auto_aggregate_min_interval_seconds: 0
